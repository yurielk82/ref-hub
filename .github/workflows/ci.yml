---
name: CI

"on":
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: install
        run: npm ci

      # build 가 prebuild 훅을 통해 sync-docs 를 자동 실행
      - name: build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: test
        run: npm test
